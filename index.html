<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Khaiwal Result</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f2f2f2;
}

.top{
background:#001818;
color:white;
padding:20px;
border-radius:0 0 15px 15px;
text-align:center;
}

.top h1{
color:#FFD700;
margin:0;
font-size:35px;
}

.market{
font-size:22px;
padding:6px;
}

.phone{
font-size:45px;
font-weight:bold;
color:#FFD700;
}

.btn{
display:inline-block;
padding:12px 20px;
margin:5px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
color:white;
}

.whatsapp{
background:#25D366;
}

.call{
background:red;
}

.live{
background:linear-gradient(to right,#ff0066,#ff9900);
color:white;
text-align:center;
font-size:24px;
font-weight:bold;
padding:12px;
margin-top:10px;
}

.box{
padding:15px;
margin:8px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.15);
overflow:hidden;
}

.status{
background:#333;
color:white;
display:inline-block;
padding:5px 12px;
border-radius:8px;
font-weight:bold;
}

.name{
font-size:25px;
font-weight:bold;
margin-top:10px;
}

.time{
color:gray;
}

.result{
float:right;
font-size:50px;
font-weight:bold;
}

.chart{
color:blue;
font-size:14px;
}

</style>
</head>

<body>

<div class="top">

<h1>ONLINE KHAIWAL</h1>

<div id="topMarkets"></div>

<p>जोड़ी रेट 10.....950</p>

<p>सबसे फास्ट पेमेंट की सुविधा</p>

<div class="phone">9649269875</div>

<a class="btn whatsapp"
href="https://wa.me/919649269875">
WhatsApp
</a>

<a class="btn call"
href="tel:9649269875">
Call Now
</a>

</div>


<div class="live">
🔥 SATTA KING SUPER FAST RESULTS 🔥
</div>


<div id="result"></div>


<script>

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQBZCDddBSSFrPnx8hNWqYZOHJv667cU2FP_ngC4PdsjfINvskiZjvoehO_k7448ExK6qq9MkJoU5Kt/pub?output=csv";

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

let rows=data.trim().split("\n");

let topHTML="";
let resultHTML="";

for(let i=1;i<rows.length;i++){

let col=rows[i].split(",");

topHTML+=`
<div class="market">
🔥 ${col[1]} ........ ${col[2]}
</div>
`;

resultHTML+=`

<div class="box" style="background:${i%2==0?'#fff':'#ffe066'}">

<div class="status">
${col[0]}
</div>

<div class="result">
${col[3]} &nbsp;&nbsp; ${col[4]}
</div>

<div class="name">
${col[1]}
</div>

<div class="time">
at ${col[2]}
</div>

<div class="chart">
Record Chart
</div>

</div>

`;

}

document.getElementById("topMarkets").innerHTML=topHTML;

document.getElementById("result").innerHTML=resultHTML;

});

</script>

</body>
</html>
